<!doctype html>
<html>
  <head>
    <title>LogootPlus</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style>
      #textcontainer { display: flex; gap: 15px; margin-bottom: 20px; }
      textarea { flex: 1; height: 250px; font-family: monospace; padding: 10px; }
      .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 600px; }
      button { padding: 8px; cursor: pointer; }
      .danger { background: #fee; border-color: #fcc; }
    </style>
  </head>
  <body>
  <div id="textcontainer">
    <textarea id="text1" placeholder="Agent 0"></textarea>
    <textarea id="text2" placeholder="Agent 1"></textarea>
    <textarea id="text3" placeholder="Agent 2"></textarea>
  </div>

  <div class="controls">
    <div class="button-group">
      <div class="group-label">Sync into Agent 0</div>
      <button id="2to1">Sync 1 ← 2</button>
      <button id="3to1">Sync 1 ← 3</button>
    </div>

    <div class="button-group">
      <div class="group-label">Sync into Agent 1</div>
      <button id="1to2">Sync 2 ← 1</button>
      <button id="3to2">Sync 2 ← 3</button>
    </div>

    <div class="button-group">
      <div class="group-label">Sync into Agent 2</div>
      <button id="1to3">Sync 3 ← 1</button>
      <button id="2to3">Sync 3 ← 2</button>
    </div>

    <button id="reset">Reset All Agents</button>
  </div>
    <script type="module" src="bundle.js"></script>
  </body>
</html>
